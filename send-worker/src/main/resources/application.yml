spring:
  application:
    name: send-worker

  datasource:
    url: jdbc:postgresql://banco-postgres:5432/notification-service
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  rabbitmq:
    host: mensageria-rabbitmq
    port: 5672
    username: ${RABBIT_USER}
    password: ${RABBIT_PASSWORD}

app:
  rabbit:
    exchange: notification.exchange
    queue: notification.queue
    routing-key: notification.created
    queue-status: notification.status.queue
    routing-key-status: notification.status.updated

server:
  port: 8081